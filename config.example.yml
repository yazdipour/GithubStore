server:
  base_url: http://localhost:8080
  host: 0.0.0.0
  ui_config: false

github:
  # Optional, but recommended to avoid low unauthenticated GitHub API limits.
  token: ""

source:
  name: GithubStore
  slug: source
  subtitle: GitHub release IPA source
  description: Self-hosted AltStore source generated from GitHub release IPA assets.
  tint_color: "#24292F"
  cache_seconds: 600
  icon: imgs/ICON-120-blue.png

repositories:
  - url: https://github.com/example/example-ios-app
    tint_color: "#24292F"
    icon: imgs/ICON-120-blue.png

  - url: https://github.com/example/another-ios-app
    tint_color: "#0969DA"
    icon: imgs/ICON-120-green.png
